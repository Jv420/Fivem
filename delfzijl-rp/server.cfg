# =====================================================
# Delfzijl RP - ESX Legacy Starter server.cfg
# IP: 5.83.172.129:10090 | Host: Nitrado | Panel: txAdmin
# =====================================================

sv_hostname "Delfzijl RP | Nederlandse ESX Legacy Roleplay"
sets sv_projectName "Delfzijl RP"
sets sv_projectDesc "Nederlandse FiveM ESX Legacy server met politie, ambulance, ANWB, jobs, huizen, voertuigen en roleplay-economie"
sets locale "nl-NL"
sets tags "nl, nederlands, esx, legacy, roleplay, delfzijl"

endpoint_add_tcp "0.0.0.0:10090"
endpoint_add_udp "0.0.0.0:10090"

# Vul je Nitrado database gegevens in via txAdmin of hier:
set mysql_connection_string "mysql://USER:PASSWORD@HOST/DATABASE?charset=utf8mb4"

# OneSync
set onesync on

# ESX instellingen
setr esx:locale "nl"
setr ox:locale "nl"

# Voice optioneel: pma-voice aanbevolen
#setr voice_useNativeAudio true
#setr voice_useSendingRangeOnly true
#setr voice_defaultCycle "F11"

# Admin rechten - vervang license:xxxxx met jouw FiveM license
add_principal identifier.license:VUL_JE_LICENSE_HIER_IN group.admin
add_ace group.admin command allow
add_ace group.admin command.quit deny

